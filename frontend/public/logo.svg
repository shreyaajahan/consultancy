<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="250" cy="250" r="250" fill="#000000"/>
  
  <!-- Stars -->
  <path d="M175 115 L182 135 L203 135 L186 150 L193 170 L175 155 L157 170 L164 150 L147 135 L168 135 Z" fill="#F59E0B"/>
  <path d="M175 160 L182 180 L203 180 L186 195 L193 215 L175 200 L157 215 L164 195 L147 180 L168 180 Z" fill="#F59E0B"/>
  <path d="M175 205 L182 225 L203 225 L186 240 L193 260 L175 245 L157 260 L164 240 L147 225 L168 225 Z" fill="#F59E0B"/>
  
  <!-- Building -->
  <g id="building">
    <!-- Main tall building -->
    <rect x="210" y="100" width="45" height="140" fill="#F59E0B" stroke="#F59E0B" stroke-width="1"/>
    
    <!-- Building lines (windows) -->
    <line x1="218" y1="100" x2="218" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="226" y1="100" x2="226" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="234" y1="100" x2="234" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="242" y1="100" x2="242" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="250" y1="100" x2="250" y2="240" stroke="#000000" stroke-width="2"/>
    
    <!-- Horizontal lines -->
    <line x1="210" y1="120" x2="255" y2="120" stroke="#000000" stroke-width="1"/>
    <line x1="210" y1="140" x2="255" y2="140" stroke="#000000" stroke-width="1"/>
    <line x1="210" y1="160" x2="255" y2="160" stroke="#000000" stroke-width="1"/>
    <line x1="210" y1="180" x2="255" y2="180" stroke="#000000" stroke-width="1"/>
    <line x1="210" y1="200" x2="255" y2="200" stroke="#000000" stroke-width="1"/>
    <line x1="210" y1="220" x2="255" y2="220" stroke="#000000" stroke-width="1"/>
    
    <!-- Shorter building right -->
    <rect x="260" y="140" width="40" height="100" fill="#F59E0B" stroke="#F59E0B" stroke-width="1"/>
    
    <!-- Right building lines -->
    <line x1="267" y1="140" x2="267" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="274" y1="140" x2="274" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="281" y1="140" x2="281" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="288" y1="140" x2="288" y2="240" stroke="#000000" stroke-width="2"/>
    <line x1="295" y1="140" x2="295" y2="240" stroke="#000000" stroke-width="2"/>
  </g>
  
  <!-- Wings/Curves -->
  <!-- Left wing -->
  <path d="M 210 240 Q 150 260 140 310 Q 135 330 145 340" fill="none" stroke="#F59E0B" stroke-width="12" stroke-linecap="round"/>
  <path d="M 205 250 Q 145 275 130 320 Q 123 345 135 350" fill="none" stroke="#F59E0B" stroke-width="10" stroke-linecap="round"/>
  <path d="M 200 260 Q 140 290 120 330 Q 110 360 125 360" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Right wing -->
  <path d="M 255 240 Q 315 260 325 310 Q 330 330 320 340" fill="none" stroke="#F59E0B" stroke-width="12" stroke-linecap="round"/>
  <path d="M 260 250 Q 320 275 335 320 Q 342 345 330 350" fill="none" stroke="#F59E0B" stroke-width="10" stroke-linecap="round"/>
  <path d="M 265 260 Q 325 290 345 330 Q 355 360 340 360" fill="none" stroke="#F59E0B" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="250" y="400" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#F59E0B" text-anchor="middle" letter-spacing="4">NIVAS</text>
  <text x="250" y="430" font-family="Arial, sans-serif" font-size="20" fill="#F59E0B" text-anchor="middle" letter-spacing="2">CONSTRUCTION</text>
</svg>